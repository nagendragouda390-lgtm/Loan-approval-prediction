<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Predictor</title>
</head>
<body>

<h1>Loan Approval Predictor</h1>

<form action="/predict" method="POST">

    <input type="number" name="person_age" placeholder="Age" required><br><br>

    <input type="number" name="person_income" placeholder="Income" required><br><br>

    <input type="text" name="person_home_ownership" placeholder="Home Ownership" required><br><br>

    <input type="number" name="person_emp_length" placeholder="Employment Length" required><br><br>

    <input type="text" name="loan_intent" placeholder="Loan Intent" required><br><br>

    <input type="text" name="loan_grade" placeholder="Loan Grade" required><br><br>

    <input type="number" name="loan_amnt" placeholder="Loan Amount" required><br><br>

    <input type="number" step="0.01" name="loan_int_rate" placeholder="Interest Rate" required><br><br>

    <input type="number" step="0.01" name="loan_percent_income" placeholder="Loan Percent Income" required><br><br>

    <input type="text" name="cb_person_default_on_file" placeholder="Default on File (Y/N)" required><br><br>

    <input type="number" name="cb_person_cred_hist_length" placeholder="Credit History Length" required><br><br>

    <button type="submit">Predict</button>

</form>

{% if prediction %}
<h2>{{ prediction }}</h2>
{% endif %}

</body>
  </html>
